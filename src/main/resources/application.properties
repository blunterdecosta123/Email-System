spring.application.name=email-system
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/email_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.pop3.host=${POP3_HOST:}
app.mail.pop3.port=${POP3_PORT:995}
app.mail.pop3.ssl=${POP3_SSL:true}
app.mail.pop3.username=${POP3_USERNAME:${MAIL_USERNAME:}}
app.mail.pop3.password=${POP3_PASSWORD:${MAIL_PASSWORD:}}
app.mail.pop3.max-messages=${POP3_MAX_MESSAGES:10}

server.error.whitelabel.enabled=false
