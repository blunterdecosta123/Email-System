<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Compose Email</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <strong>Email System</strong>
    <nav>
        <a th:href="@{/}">History</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="link-button" type="submit">Sign out</button>
        </form>
    </nav>
</header>

<main class="container narrow">
    <h1>Compose email</h1>
    <section class="panel">
        <form th:action="@{/compose}" th:object="${form}" method="post" class="stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                Recipient
                <input type="email" th:field="*{recipient}" required>
                <span class="field-error" th:errors="*{recipient}"></span>
            </label>
            <label>
                Subject
                <input type="text" th:field="*{subject}" required>
                <span class="field-error" th:errors="*{subject}"></span>
            </label>
            <label>
                Body
                <textarea th:field="*{body}" rows="12" required></textarea>
                <span class="field-error" th:errors="*{body}"></span>
            </label>
            <div class="actions">
                <a class="button secondary" th:href="@{/}">Cancel</a>
                <button type="submit">Send</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
