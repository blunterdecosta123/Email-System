<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${message.subject}">Email</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <strong>Email System</strong>
    <nav>
        <a th:href="@{/}">History</a>
        <a th:href="@{/compose}">Compose</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="link-button" type="submit">Sign out</button>
        </form>
    </nav>
</header>

<main class="container narrow">
    <section class="panel message-detail">
        <span class="badge" th:text="${message.direction}"></span>
        <h1 th:text="${message.subject}"></h1>
        <dl>
            <div>
                <dt>From</dt>
                <dd th:text="${message.sender}"></dd>
            </div>
            <div>
                <dt>To</dt>
                <dd th:text="${message.recipient}"></dd>
            </div>
            <div>
                <dt>Date</dt>
                <dd th:text="${#temporals.format(message.displayDate, 'yyyy-MM-dd HH:mm')}"></dd>
            </div>
        </dl>
        <pre th:text="${message.body}"></pre>
    </section>
</main>
</body>
</html>
