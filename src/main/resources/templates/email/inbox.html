<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email History</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div>
        <strong>Email System</strong>
        <span th:text="${user.displayName}"></span>
    </div>
    <nav>
        <a th:href="@{/compose}">Compose</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="link-button" type="submit">Sign out</button>
        </form>
    </nav>
</header>

<main class="container">
    <div class="page-heading">
        <div>
            <h1>Email history</h1>
            <p class="muted">Sent, received, and locally saved messages.</p>
        </div>
        <form th:action="@{/receive}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="secondary">Receive POP3</button>
        </form>
    </div>

    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <section class="panel table-panel" th:if="${!messages.isEmpty()}">
        <table>
            <thead>
            <tr>
                <th>Status</th>
                <th>Subject</th>
                <th>From</th>
                <th>To</th>
                <th>Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="message : ${messages}">
                <td><span class="badge" th:text="${message.direction}"></span></td>
                <td><a th:href="@{/messages/{id}(id=${message.id})}" th:text="${message.subject}"></a></td>
                <td th:text="${message.sender}"></td>
                <td th:text="${message.recipient}"></td>
                <td th:text="${#temporals.format(message.displayDate, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="empty-state" th:if="${messages.isEmpty()}">
        <h2>No email history yet</h2>
        <p class="muted">Compose a message or import messages from POP3.</p>
        <a class="button" th:href="@{/compose}">Compose email</a>
    </section>
</main>
</body>
</html>
